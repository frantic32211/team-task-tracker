version: "3.9"

services:
  app:
    build: .
    container_name: team-task-tracker-app
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    env_file:
      - .env

  mongo:
    image: mongo:7
    container_name: team-task-tracker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: team-task-tracker-redis
    ports:
      - "6379:6379"

volumes:
  mongo_data: